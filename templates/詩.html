<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨影留白 - 詩詞互動</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 使用思源宋體，最適合展現中國詩詞的優雅 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Serif TC', serif;
            /* 預設紙張底色 */
            background-color: #F4F1EA; 
            margin: 0;
            padding: 0;
            overflow-x: auto;
            overflow-y: hidden;
            /* 讓滾動條變得優雅 */
            scrollbar-width: thin;
            scrollbar-color: #8c7b6d transparent;
        }

        /* 自訂背景圖層，設定 50% 透明度。等你之後換上喜歡的網址 */
        .custom-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.5;
            z-index: -2;
        }

        /* 宣紙般的霧面遮罩，營造出國畫「留白」與仙氣感 */
        .ink-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, rgba(244, 241, 234, 0.92) 0%, rgba(220, 215, 205, 0.8) 100%);
            backdrop-filter: blur(3px);
            z-index: -1;
            pointer-events: none; /* 確保不會擋到滑鼠互動 */
        }

        /* 詩詞容器：直書、由右至左 */
        .poem-container {
            writing-mode: vertical-rl;
            text-orientation: upright;
            height: 80vh;
            margin: 10vh auto;
            padding: 0 10vw; /* 左右留白 */
            color: #2c2c2c;
            display: flex;
            align-items: flex-start;
            gap: 3rem; /* 行距 */
        }

        /* 單行詩句 */
        .poem-line {
            display: inline-flex;
            flex-direction: column;
            gap: 0.5rem; /* 字距 */
        }

        /* 單個字 */
        .char {
            display: inline-block;
            font-size: 3.5rem; /* 文字要大且優雅 */
            font-weight: 300;
            cursor: default;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            /* 單純控制透明度的過渡動畫：2秒漸變 */
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 字被碰到時的狀態：變成完全透明，但保留原位 */
        .char.transparent {
            opacity: 0;
        }

        /* 詩詞輸入框區域 */
        .input-panel {
            position: fixed;
            bottom: 2rem;
            right: 6rem;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            opacity: 0.4;
            transition: opacity 0.3s;
            z-index: 10;
        }
        .input-panel:hover {
            opacity: 1;
        }
        .input-panel textarea {
            background: rgba(244, 241, 234, 0.7);
            border: 1px solid #8c7b6d;
            color: #2c2c2c;
            font-family: 'Noto Serif TC', serif;
            padding: 0.5rem;
            border-radius: 4px;
            outline: none;
            resize: none;
            width: 250px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }
        .input-panel button {
            background: #a83b3b;
            color: #F4F1EA;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Noto Serif TC', serif;
            font-weight: 600;
            transition: background 0.3s;
        }
        .input-panel button:hover {
            background: #8c3030;
        }

        /* 中國風印章裝飾 */
        .seal {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            width: 50px;
            height: 50px;
            border: 2px solid #a83b3b;
            color: #a83b3b;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 4px;
            writing-mode: vertical-rl;
            opacity: 0.7;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.3s;
            user-select: none;
            z-index: 10;
        }

        .seal:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        /* RWD 微調 */
        @media (max-width: 768px) {
            .char { font-size: 2.5rem; }
            .poem-container { height: 70vh; margin: 15vh auto; gap: 2rem; }
            .input-panel { right: 2rem; bottom: 6rem; }
        }
    </style>
</head>
<body>

    <!-- 背景圖層 -->
    <div class="custom-bg"></div>

    <!-- 背景霧面遮罩 -->
    <div class="ink-overlay"></div>

    <!-- 詩詞內容區 -->
    <div class="poem-container" id="poem-box">
        <!-- JS 會動態將文字注入這裡 -->
    </div>

    <!-- 右下角印章（點擊可重置全部文字） -->
    <div class="seal" onclick="resetAll()" title="重新凝聚">忘歸</div>

    <!-- 輸入框區塊 -->
    <div class="input-panel">
        <textarea id="custom-poem-input" rows="4" placeholder="在此輸入你的心緒...&#10;每行請用換行隔開"></textarea>
        <button onclick="applyNewPoem()">提筆入夢</button>
    </div>

    <script>
        // 預設詩詞
        let poemText = [
            "人生若只如初見",
            "何事秋風悲畫扇",
            "等閒變卻故人心",
            "卻道故人心易變"
        ];

        const container = document.getElementById('poem-box');
        let charElements = [];

        // 初始化網頁：將詩句拆解成單個字，並包裝成 span 標籤
        function initPoem() {
            // 清空容器，避免重複疊加
            container.innerHTML = '';
            charElements = [];

            poemText.forEach(line => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'poem-line';
                
                // 拆解每個字
                const chars = line.split('');
                chars.forEach(char => {
                    const charSpan = document.createElement('span');
                    charSpan.className = 'char';
                    charSpan.textContent = char;
                    
                    // 滑鼠碰到時變透明
                    charSpan.addEventListener('mouseenter', () => fadeChar(charSpan));
                    charSpan.addEventListener('touchstart', (e) => {
                        e.preventDefault(); 
                        fadeChar(charSpan);
                    }, { passive: false });

                    lineDiv.appendChild(charSpan);
                    charElements.push(charSpan);
                });
                container.appendChild(lineDiv);
            });
        }

        // 核心邏輯：讓字變透明，並設定計時器讓它慢慢浮現
        function fadeChar(element) {
            // 如果已經在透明狀態，就不重複執行
            if (element.classList.contains('transparent')) return;

            // 加上 transparent class，觸發 opacity 漸變
            element.classList.add('transparent');

            // 設定 3 秒後自動回來 (3000 毫秒)
            setTimeout(() => {
                element.classList.remove('transparent');
            }, 3000);
        }

        // 印章按鈕功能：一鍵讓所有字立刻浮現
        function resetAll() {
            charElements.forEach(char => {
                char.classList.remove('transparent');
            });
        }

        // 寫入新詩詞的功能
        function applyNewPoem() {
            const inputVal = document.getElementById('custom-poem-input').value;
            if (!inputVal.trim()) return; // 空白就不處理
            
            // 依據換行符號切割成陣列，並過濾掉空行
            poemText = inputVal.split('\n').filter(line => line.trim() !== '');
            
            // 重新初始化
            initPoem();
        }

        // 載入完畢後執行
        window.onload = initPoem;
    </script>

</body>
</html>
